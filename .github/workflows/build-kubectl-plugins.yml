name: Build & Release kubectl plugins

on:
  push:
    paths:
      - 'src/kubectl-plugins/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 🔢 Compute version
        id: version
        run: |
          VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"

      - name: 🔨 Build all plugins (multi-arch)
        run: |
          set -euo pipefail

          mkdir -p dist

          for dir in src/kubectl-plugins/*/; do
            [[ -d "$dir" ]] || continue
            [[ -f "$dir/go.mod" ]] || continue

            name=$(basename "$dir")

            for GOOS in linux darwin; do
              for GOARCH in amd64 arm64; do
                output="dist/kubectl-$name-$GOOS-$GOARCH"

                echo "🔨 Building $name for $GOOS/$GOARCH → $output"

                GOOS=$GOOS GOARCH=$GOARCH \
                  go build -C "$dir" -ldflags="-s -w" -o "$output"

                # ✅ Minimal but correct validation
                if [[ ! -s "$output" ]]; then
                  echo "❌ Build failed: $output is empty"
                  exit 1
                fi

                echo "🔍 Built artifact:"
                file "$output" || true
              done
            done
          done

          echo ""
          echo "📦 Built binaries:"
          ls -lh dist/

      - name: 🔐 Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "📦 Checksums:"
          cat checksums.txt

      - name: 📦 Upload artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: kubectl-plugins
          path: dist/*

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Kubectl Plugins ${{ steps.version.outputs.version }}"
          files: |
            dist/*
