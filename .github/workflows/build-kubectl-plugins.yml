name: Build & Release kubectl plugins

on:
  push:
    paths:
      - 'src/kubectl-plugins/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 🔢 Compute version
        id: version
        run: |
          VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"

      - name: 🔨 Build kubectl plugins
        run: |
          set -euo pipefail

          mkdir -p dist
          found_any=0

          for dir in src/kubectl-plugins/*/; do
            [[ -d "$dir" ]] || continue
            [[ -f "$dir/go.mod" ]] || continue

            name=$(basename "$dir")

            echo ""
            echo "🔍 Processing plugin: $name"

            # ✅ Ensure it's a CLI (must contain package main)
            if ! grep -qr "^package main" "$dir"; then
              echo "⚠️ Skipping $name (no main package)"
              continue
            fi

            found_any=1

            for GOOS in linux darwin; do
              for GOARCH in amd64 arm64; do
                output="$(pwd)/dist/kubectl-$name-$GOOS-$GOARCH"

                echo "🔨 Building $name for $GOOS/$GOARCH → $output"

                (
                  cd "$dir"
                  GOOS=$GOOS GOARCH=$GOARCH \
                    go build -v -ldflags="-s -w" -o "$output"
                )

                # ✅ Validate binary exists
                if [[ ! -s "$output" ]]; then
                  echo "❌ Build failed: $output missing or empty"
                  exit 1
                fi

                echo "✅ Built $output"
              done
            done
          done

          if [[ "$found_any" -eq 0 ]]; then
            echo "❌ No valid kubectl plugins found"
            exit 1
          fi

          echo ""
          echo "📦 Final artifacts:"
          ls -lh dist/

      - name: 🔐 Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "📦 Checksums:"
          cat checksums.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Kubectl Plugins ${{ steps.version.outputs.version }}"
          files: |
            dist/*
