external-dns:
  fullnameOverride: external-dns

  # Log configuration
  logLevel: warning
  logFormat: json

  # Interval for DNS updates.
  interval: 1m
  
  # -- Specify the registry for storing ownership and labels.
  # Valid values are `txt`, `aws-sd`, `dynamodb` & `noop`.
  registry: txt

  # -- (string) Specify a prefix for the domain names of TXT records created for the `txt` registry.
  # Mutually exclusive with `txtSuffix`.
  txtPrefix: externaldns-

  # How DNS records are synchronized between sources and providers; available values are `create-only`, `sync`, & `upsert-only`.
  # - create-only: only create records, don't update or delete
  # - upsert-only: create and update records as needed, never remove records.
  # - sync: full authority over records, create, update and delete records as needed.
  policy: sync

  # Kubernetes resources to monitor for DNS entries.
  sources:
    - gateway-httproute

  # Sets a unique identifier written into TXT registry records so ExternalDNS knows which DNS records it owns and can
  # safely manage them without clashing with other ExternalDNS instances.
  # MUST be unique for each cluster and must not change.
  txtOwnerId: minikube

  # Limit possible target zones by domain suffixes.
  domainFilters:
    - rezakara.demo

  # DNS Provider
  provider: rfc2136

  env:
    - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
      valueFrom:
        secretKeyRef:
          name: external-dns-tsig
          key: tsig_secret
    - name: EXTERNAL_DNS_RFC2136_TSIG_KEYNAME
      valueFrom:
        secretKeyRef:
          name: external-dns-tsig
          key: tsig_key_name
    - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET_ALG
      valueFrom:
        secretKeyRef:
          name: external-dns-tsig
          key: algorithm
