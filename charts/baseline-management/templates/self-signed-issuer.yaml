# This is required in clusters that rely on self-signed certificates; otherwise the need depends on your PKI design.
{{- if .Capabilities.APIVersions.Has "cert-manager.io/v1/ClusterIssuer" }}

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}

{{- end }}
