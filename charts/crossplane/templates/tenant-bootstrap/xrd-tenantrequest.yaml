{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v2/CompositeResourceDefinition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tenantrequests.idp.rezakara.demo

spec:
  scope: Cluster
  group: idp.rezakara.demo

  names:
    kind: TenantRequest
    plural: tenantrequests

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]

          properties:
            spec:
              type: object
              required: ["name", "dnsName", "environmentPrefix", "owner", "gitops"]

              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

                dnsName:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

                environmentPrefix:
                  type: string
                  description: Environment prefix used in DNS and gateway hostnames (e.g. dev, wl, prod).
                  minLength: 1
                  maxLength: 16
                  pattern: "^[a-z0-9-]+$"

                displayName:
                  type: string
                  minLength: 1
                  maxLength: 128

                owner:
                  type: object
                  required: ["team"]
                  properties:
                    team:
                      type: string
                    email:
                      type: string

                gitops:
                  type: object
                  required: ["syncRepos"]
                  properties:
                    syncRepos:
                      type: array
                      minItems: 1
                      items:
                        type: string
                        pattern: "^(https://|ssh://|git@).+"

            status:
              type: object
              properties:

                observedGeneration:
                  type: integer
                  format: int64

                phase:
                  type: string
                  description: Current lifecycle phase of the request.
                  enum:
                    - PendingApproval
                    - Provisioning
                    - Ready
                    - Failed

                tenantName:
                  type: string
                  description: Name of the created Tenant resource.

                conditions:
                  type: array
                  description: Standard Crossplane status conditions including approval state.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.name
        - name: Team
          type: string
          jsonPath: .spec.owner.team
        - name: Approved
          type: string
          jsonPath: .status.conditions[?(@.type=="Approved")].status
        - name: Phase
          type: string
          jsonPath: .status.phase

---
{{- end }}
{{- end }}
