{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v2/CompositeResourceDefinition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tenants.idp.rezakara.demo

spec:
  scope: Cluster
  group: idp.rezakara.demo

  names:
    kind: Tenant
    plural: tenants

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]

          properties:

            spec:
              type: object
              required: ["name", "dnsName", "environmentPrefix", "owner", "argocd"]

              properties:

                name:
                  type: string
                  description: Human-readable tenant name. Lowercase + hyphens only.
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

                dnsName:
                  type: string
                  description: Abbreviated identifier used e.g. as subdomain label.
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

                environmentPrefix:
                  type: string
                  description: Environment prefix used for routing and hostnames.
                  minLength: 1
                  maxLength: 16
                  pattern: "^[a-z0-9-]+$"

                displayName:
                  type: string
                  description: Human readable tenant name shown in UI and dashboards.
                  minLength: 1
                  maxLength: 128

                owner:
                  type: object
                  description: Ownership metadata for auditing and routing.
                  required: ["team"]
                  properties:
                    team:
                      type: string
                      description: Owning team identifier (e.g. github team, AD group, etc.)
                      minLength: 1
                      maxLength: 128
                    email:
                      type: string
                      description: Optional contact email.
                      maxLength: 256

                argocd:
                  type: object
                  description: Argo CD specific configuration for tenant isolation and access control.

                  required: ["syncRepos"]

                  properties:

                    syncRepos:
                      type: array
                      description: List of git repository URLs Argo CD is permitted to sync from.
                      minItems: 1

                      items:
                        type: string
                        pattern: "^(https://|ssh://|git@).+"

                    syncPolicy:
                      type: object
                      description: Defaults for generated Argo CD Applications.

                      properties:

                        automatedSync:
                          type: boolean
                          default: true

                        prune:
                          type: boolean
                          default: true

                        selfHeal:
                          type: boolean
                          default: true

                options:
                  type: object
                  description: Platform options (non-ArgoCD).

                  properties:

                    costCenter:
                      type: string
                      maxLength: 64

                    labels:
                      type: object
                      additionalProperties:
                        type: string

                    annotations:
                      type: object
                      additionalProperties:
                        type: string

            status:
              type: object

              properties:

                phase:
                  type: string
                  description: Current lifecycle phase of the tenant.

                  enum:
                    - Provisioning
                    - Ready
                    - Failed

                identity:
                  type: object
                  description: Identity resources created for the tenant.

                  properties:

                    aadGroupId:
                      type: string
                      description: Azure AD Group Object ID.
                      pattern: "^[0-9a-fA-F-]{36}$"

                conditions:
                  type: array
                  description: Standard Crossplane conditions.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                tenantName:
                  type: string
                  description: Name of the created Tenant resource.

                observedGeneration:
                  type: integer
                  format: int64

      additionalPrinterColumns:

        - name: Tenant
          type: string
          jsonPath: .spec.name

        - name: DNS
          type: string
          jsonPath: .spec.dnsName

        - name: Team
          type: string
          jsonPath: .spec.owner.team

        - name: AADGroup
          type: string
          jsonPath: .status.identity.aadGroupId

        - name: Phase
          type: string
          jsonPath: .status.phase

---
{{- end }}
{{- end }}
