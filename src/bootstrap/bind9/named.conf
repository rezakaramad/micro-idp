// -------------------------------------
// BIND9 configuration for demo DNS
// Used with external-dns via RFC2136
// -------------------------------------

options {
    // Working directory where BIND stores runtime data (cache, etc.)
    directory "/var/cache/bind";

    // Listen on all network interfaces (required so Docker + Minikube can reach it)
    listen-on { any; };

    // Allow DNS queries from any client (fine for local/demo setup)
    allow-query { any; };

    // Disable recursion since this is an authoritative-only server
    recursion no;
};

// -------------------------------------
// TSIG key (loaded from external file)
// -------------------------------------
// This file is generated at runtime from Vault
// and contains the "externaldns-key" definition
include "/etc/bind/tsig.key";

// -------------------------------------
// DNS zone configuration
// -------------------------------------
zone "fluxdojo.demo" {
    // This server is the authoritative source (master) for the zone
    type master;

    // Path to the zone file containing DNS records for fluxdojo.demo
    file "/zones/fluxdojo.demo.db";

    // Allow dynamic DNS updates ONLY from clients with the TSIG key
    allow-update { key "externaldns-key"; };
};

// -------------------------------------
// Mental model
// -------------------------------------
// external-dns → RFC2136 (TSIG auth) → BIND9 → zone file updates
//
// TSIG key is NOT stored in this file anymore.
// It is injected at runtime via:
//   include "/etc/bind/tsig.key";
//
// This keeps secrets out of version control and avoids templating.