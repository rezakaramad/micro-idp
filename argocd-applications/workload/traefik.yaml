apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-wl
  namespace: argocd
spec:
  project: platform-system
  source:
    repoURL: https://github.com/rezakaramad/kubepave
    targetRevision: HEAD
    path: charts/traefik
    helm:
      valueFiles:
        - values-wl.yaml
  destination:
    name: minikube-workload
    namespace: platform-system
  syncPolicy:
    syncOptions:
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
